<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Story Builder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; min-height: 100vh; padding: 0 0 60px; }

  /* STORY PICKER */
  .picker-screen { max-width: 720px; margin: 0 auto; padding: 32px 16px; }
  .picker-screen h2 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .picker-screen p  { font-size: 14px; color: #666; margin-bottom: 24px; }
  .story-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .story-card-btn {
    background: #fff; border: 1.5px solid #e0e4ea; border-radius: 14px;
    padding: 20px 18px; cursor: pointer; text-align: left;
    transition: border-color 0.15s, box-shadow 0.15s; font-family: inherit;
  }
  .story-card-btn:hover { border-color: #1D9E75; box-shadow: 0 2px 12px rgba(29,158,117,0.12); }
  .story-card-btn .emoji { font-size: 32px; margin-bottom: 10px; display: block; }
  .story-card-btn h3 { font-size: 15px; font-weight: 600; margin-bottom: 5px; color: #1a1a2e; }
  .story-card-btn p  { font-size: 13px; color: #777; line-height: 1.5; }
  .story-card-btn .tag { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px; background: #E1F5EE; color: #085041; margin-top: 10px; font-weight: 500; }

  /* HEADER */
  header { background: #1D9E75; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 14px; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  header .icon { font-size: 26px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header p  { font-size: 12px; opacity: 0.82; margin-top: 2px; }
  .back-btn { background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35); color: #fff; border-radius: 8px; padding: 6px 13px; font-size: 13px; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .back-btn:hover { background: rgba(255,255,255,0.28); }

  /* PROGRESS */
  .progress-wrap { background: #fff; border-bottom: 1px solid #e4e8ef; padding: 11px 24px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 5px; }
  .bar-bg  { height: 7px; border-radius: 4px; background: #e4e8ef; overflow: hidden; }
  .bar-fill{ height: 100%; border-radius: 4px; background: #1D9E75; transition: width 0.4s ease; }

  .container { max-width: 720px; margin: 0 auto; padding: 0 16px; }

  /* STAGE TABS */
  .stage-tabs { display: flex; gap: 8px; flex-wrap: wrap; padding: 14px 0 0; }
  .stage-tab { padding: 7px 15px; border-radius: 20px; font-size: 13px; border: 1.5px solid #d1d9e0; background: #fff; color: #555; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .stage-tab.active  { background: #1D9E75; border-color: #1D9E75; color: #fff; font-weight: 600; }
  .stage-tab.done    { background: #E1F5EE; border-color: #5DCAA5; color: #085041; }
  .stage-tab:disabled{ opacity: 0.4; cursor: default; }

  /* MAIN CARD */
  .main-card { background: #fff; border: 1px solid #e4e8ef; border-radius: 14px; padding: 20px; margin-top: 16px; }
  .prompt-strip { background: #E1F5EE; border-left: 4px solid #1D9E75; border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 14px; font-size: 14px; color: #085041; font-weight: 500; }
  .section-label { font-size: 11px; color: #999; margin-bottom: 6px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }

  /* TILES */
  .tile-bank { display: flex; flex-wrap: wrap; min-height: 44px; margin-bottom: 12px; }
  .tile { display: inline-flex; align-items: center; padding: 7px 13px; margin: 4px; border-radius: 20px; font-size: 15px; cursor: pointer; border: 1.5px solid #c8d0da; background: #fff; color: #1a1a2e; user-select: none; transition: opacity 0.15s, transform 0.1s, box-shadow 0.1s; font-family: inherit; }
  .tile:hover:not(.used) { transform: scale(1.05); box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-color: #1D9E75; }
  .tile:active:not(.used) { transform: scale(0.97); }
  .tile.used { opacity: 0.2; pointer-events: none; }

  /* DROP ZONE */
  .drop-zone { min-height: 58px; border: 2px dashed #c8d0da; border-radius: 10px; padding: 8px 12px; display: flex; flex-wrap: wrap; align-items: center; background: #fafbfc; transition: background 0.15s, border-color 0.15s; }
  .drop-zone.over { background: #E1F5EE; border-color: #1D9E75; }
  .drop-zone-empty { font-size: 13px; color: #bbb; font-style: italic; }
  .placed-tile { display: inline-flex; align-items: center; padding: 7px 13px; margin: 3px; border-radius: 20px; font-size: 15px; cursor: pointer; background: #E1F5EE; border: 1.5px solid #5DCAA5; color: #085041; font-family: inherit; transition: opacity 0.15s, transform 0.1s; }
  .placed-tile:hover { opacity: 0.7; transform: scale(0.97); }
  .placed-tile.dz-over { border-color: #1D9E75; box-shadow: -3px 0 0 #1D9E75; transform: translateX(3px); }

  /* HINT */
  .hint-box { font-size: 13px; padding: 9px 13px; border-radius: 8px; min-height: 36px; display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .hint-box.info  { background: #f0f2f5; color: #555; border: 1px solid #e0e4ea; }
  .hint-box.right { background: #E1F5EE; color: #085041; border: 1px solid #5DCAA5; }
  .hint-box.wrong { background: #FCEBEB; color: #7c2020; border: 1px solid #F09595; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .btn { padding: 9px 22px; border-radius: 8px; border: 1.5px solid #c8d0da; background: #fff; color: #1a1a2e; font-size: 14px; cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.1s; font-weight: 500; }
  .btn:hover  { background: #f0f2f5; }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: #1D9E75; border-color: #1D9E75; color: #fff; }
  .btn.primary:hover { background: #0F6E56; }

  /* STORY PREVIEW */
  .story-section { margin-top: 28px; }
  .story-preview { background: #fff; border: 1px solid #e4e8ef; border-radius: 12px; padding: 18px 20px; font-size: 15px; line-height: 1.95; color: #1a1a2e; min-height: 60px; }
  .story-para { margin-bottom: 14px; }
  .story-para:last-child { margin-bottom: 0; }
  .para-label { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; padding: 2px 9px; border-radius: 20px; margin-bottom: 5px; }
  .para-label.s0 { background: #E6F1FB; color: #185FA5; }
  .para-label.s1 { background: #FAEEDA; color: #854F0B; }
  .para-label.s2 { background: #FCEBEB; color: #A32D2D; }
  .para-label.s3 { background: #E1F5EE; color: #085041; }
  .wc-note { font-size: 12px; color: #bbb; margin-top: 10px; text-align: right; }

  /* COMPLETE */
  .complete-banner { background: #E1F5EE; border: 1.5px solid #5DCAA5; border-radius: 12px; padding: 20px 22px; text-align: center; margin-top: 16px; }
  .complete-banner h2 { font-size: 20px; color: #085041; margin-bottom: 6px; }
  .complete-banner p  { font-size: 14px; color: #0F6E56; }

  @media (max-width: 480px) {
    header h1 { font-size: 16px; }
    .tile, .placed-tile { font-size: 14px; padding: 6px 10px; }
  }
</style>
</head>
<body>

<!-- PICKER SCREEN -->
<div id="picker-screen">

</div>

<!-- GAME SCREEN (hidden until story chosen) -->
<div id="game-screen" style="display:none;">
  <header>
    <div class="header-left">

    </div>

  </header>
  <div class="progress-wrap">
    <div class="container">
      <div class="progress-meta">
        <span id="progress-label">Sentence 1 of 14</span>
        <span id="wc-label">Words built: 0</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="container">
    <div class="stage-tabs" id="stage-tabs"></div>
    <div id="main-area"></div>
    <div class="story-section">
      <p class="section-label">Your story so far</p>
      <div class="story-preview" id="story-preview"><em style="color:#ccc;">Your story will appear here as you build each sentence...</em></div>
      <p class="wc-note" id="wc-note"></p>
    </div>
  </div>
</div>

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeStory = null;
let currentIdx  = 0;

let answerSeen  = false;


function shuffle(arr){ let a=[...arr]; for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ── STORY SELECTION ───────────────────────────────────────────────────────────
function startStory(idx){

  document.getElementById('picker-screen').style.display = 'none';

  gs.style.display = 'block';
  document.getElementById('hdr-icon').textContent  = activeStory.icon;
  document.getElementById('hdr-title').textContent = activeStory.title;
  document.getElementById('hdr-sub').textContent   = activeStory.sub;
  updateProgress();
  renderTabs();
  renderSentence();
}

function goBack(){
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('picker-screen').style.display = 'block';
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function renderTabs(){
  const tabs = document.getElementById('stage-tabs');
  tabs.innerHTML = STAGES.map((s,i)=>{
    const items    = activeStory.sentences.filter(x=>x.stage===i);
    const firstIdx = activeStory.sentences.findIndex(x=>x.stage===i);
    const allDone  = items.every((_,k)=>completedLines[firstIdx+k]);
    const isCurrent= currentIdx < activeStory.sentences.length && activeStory.sentences[currentIdx].stage===i;
    let cls = 'stage-tab';
    if(isCurrent) cls+=' active';
    else if(allDone) cls+=' done';
    const dis = (!isCurrent && !allDone && firstIdx > currentIdx) ? 'disabled' : '';
    return `<button class="${cls}" ${dis} onclick="jumpStage(${i})">${s.name}${allDone?' ✓':''}</button>`;
  }).join('');
}

function jumpStage(s){
  const firstIdx = activeStory.sentences.findIndex(x=>x.stage===s);
  const items    = activeStory.sentences.filter(x=>x.stage===s);
  const allDone  = items.every((_,k)=>completedLines[firstIdx+k]);
  const isCur    = activeStory.sentences[currentIdx] && activeStory.sentences[currentIdx].stage===s;
  if(isCur) return;
  if(allDone){ currentIdx=firstIdx; placed=[]; renderSentence(); }
}

// ── RENDER SENTENCE ───────────────────────────────────────────────────────────
function renderSentence(){
  if(currentIdx >= activeStory.sentences.length){ showComplete(); return; }
  const item     = activeStory.sentences[currentIdx];
  const shuffled = shuffle(item.tiles);
  const area     = document.getElementById('main-area');
  area.innerHTML = `
    <div class="main-card">
      <div class="prompt-strip">${STAGES[item.stage].prompt}</div>
      <p class="section-label">Word tiles — click a word to place it</p>
      <div class="tile-bank" id="tile-bank">
        ${shuffled.map((w,i)=>`<button class="tile" data-word="${w}" id="st-${i}">${w}</button>`).join('')}
      </div>
      <p class="section-label" style="margin-top:10px;">Your sentence</p>
      <div class="drop-zone" id="drop-zone"><span class="drop-zone-empty">Click words above — tap a green word to remove it</span></div>
      <div class="hint-box info" id="hint-box"></div>
      <div class="btn-row">
        <button class="btn primary" onclick="checkSentence()">✓ Check</button>
        <button class="btn" onclick="clearDZ()">↺ Clear</button>
      </div>
    </div>`;
  placed = [];
  tryCount   = 0;
  answerSeen = false;
  updateProgress();
  renderTabs();
  attachEvents();
}

// ── DRAG STATE ────────────────────────────────────────────────────────────────
let bankDragSrc  = null; // tile being dragged FROM the bank
let dzDragIdx    = null; // index of placed tile being dragged WITHIN the drop zone
let dzDragOver   = null; // index of placed tile being hovered over

// ── EVENTS ────────────────────────────────────────────────────────────────────
function attachEvents(){
  // Bank tiles: click or drag into drop zone
  document.querySelectorAll('.tile').forEach(t=>{
    t.addEventListener('click',()=>{
      if(!t.classList.contains('used')){
        placed.push({word:t.dataset.word, el:t});
        t.classList.add('used');
        updateDZ();
        setHint('','info');
      }
    });
    t.setAttribute('draggable','true');
    t.addEventListener('dragstart', e=>{
      bankDragSrc = t; dzDragIdx = null;
      e.dataTransfer.effectAllowed = 'copy';
      e.dataTransfer.setData('text/plain', 'bank');
    });
    t.addEventListener('dragend', ()=>{ bankDragSrc=null; });
  });

  // Drop zone: accepts bank tiles AND reorders placed tiles
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e=>{
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    // highlight insert position among placed tiles
    const target = e.target.closest('.placed-tile');
    document.querySelectorAll('.placed-tile').forEach(el=>el.classList.remove('dz-over'));
    if(target) target.classList.add('dz-over');
    else dz.classList.add('over');
  });
  dz.addEventListener('dragleave', e=>{
    if(!dz.contains(e.relatedTarget)){
      dz.classList.remove('over');
      document.querySelectorAll('.placed-tile').forEach(el=>el.classList.remove('dz-over'));
    }
  });
  dz.addEventListener('drop', e=>{
    e.preventDefault();
    dz.classList.remove('over');
    document.querySelectorAll('.placed-tile').forEach(el=>el.classList.remove('dz-over'));

    const target    = e.target.closest('.placed-tile');
    const targetIdx = target ? parseInt(target.dataset.pidx) : placed.length;

    if(bankDragSrc && !bankDragSrc.classList.contains('used')){
      // dragging a NEW word from the bank → insert at position
      const newEntry = {word: bankDragSrc.dataset.word, el: bankDragSrc};
      bankDragSrc.classList.add('used');
      placed.splice(targetIdx, 0, newEntry);
      updateDZ(); setHint('','info');
    } else if(dzDragIdx !== null && dzDragIdx !== targetIdx){
      // reordering within the drop zone
      const moving = placed.splice(dzDragIdx, 1)[0];
      const insertAt = dzDragIdx < targetIdx ? targetIdx - 1 : targetIdx;
      placed.splice(insertAt, 0, moving);
      updateDZ(); setHint('','info');
    }
    bankDragSrc = null; dzDragIdx = null;
  });
}

function updateDZ(){
  const dz = document.getElementById('drop-zone');
  if(placed.length===0){
    dz.innerHTML='<span class="drop-zone-empty">Click words above to add them — then drag placed words to reorder</span>';
    return;
  }
  dz.innerHTML = placed.map((p,i)=>
    `<button class="placed-tile" draggable="true" data-pidx="${i}"
      ondragstart="dzTileDragStart(event,${i})"
      ondragend="dzTileDragEnd(event)"
      onclick="removePlaced(${i})"
      title="Click to remove · Drag to reorder">${p.word}</button>`
  ).join('');
}

function dzTileDragStart(e, idx){
  dzDragIdx   = idx;
  bankDragSrc = null;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'dz');
  e.currentTarget.style.opacity = '0.4';
}
function dzTileDragEnd(e){
  e.currentTarget.style.opacity = '';
  dzDragIdx = null;
  document.querySelectorAll('.placed-tile').forEach(el=>el.classList.remove('dz-over'));
}

function removePlaced(idx){
  // only remove on click, not after a drag
  if(dzDragIdx !== null) return;
  placed[idx].el.classList.remove('used');
  placed.splice(idx,1);
  updateDZ(); setHint('','info');
}
function clearDZ(){ placed.forEach(p=>p.el.classList.remove('used')); placed=[]; updateDZ(); setHint('','info'); }
function setHint(msg,type){ const h=document.getElementById('hint-box'); if(!h)return; h.className='hint-box '+type; h.textContent=msg; }

// ── CHECK ─────────────────────────────────────────────────────────────────────
function checkSentence(){
  const answer=activeStory.sentences[currentIdx].answer;
  const words=placed.map(p=>p.word);
  if(words.length===0){ setHint('Click some words to build your sentence first!','info'); return; }
  const correct=words.length===answer.length && words.every((w,i)=>w===answer[i]);
  if(correct){
    const emoji = answerSeen ? '✅ Good effort! You got it right.' : '⭐ Well done! That sentence is correct!';
    setHint(emoji,'right');
    const line=words.join(' ').replace(/ ([,\.!?])/g,'$1').replace(/ '/g,"'").replace(/ —/g,'—');
    completedLines[currentIdx]=line;
    completedWC=completedLines.filter(Boolean).reduce((s,l)=>s+l.split(' ').length,0);
    updateStory();
    updateProgress();
    setTimeout(()=>{ currentIdx++; placed=[]; renderSentence(); },950);
  } else {
    tryCount++;
    // build feedback message
    let msg='';
    if(words.length<answer.length) msg=`Not quite — you still need ${answer.length-words.length} more word(s).`;
    else if(words.length>answer.length) msg='Too many words — try removing some.';
    else { const f=words.findIndex((w,i)=>w!==answer[i]); msg=`Check word ${f+1} — something is not right there. Try again!`; }
    // after 3 wrong tries show the See Answer button (only once)
    if(tryCount>=3 && !answerSeen){
      setHint(msg + '  (3 tries used — you can now see the answer below.)','wrong');
      showSeeAnswerBtn();
    } else if(answerSeen){
      setHint(msg,'wrong');
    } else {
      const left = 3-tryCount;
      setHint(msg + (left>0 ? ` (${left} tr${left===1?'y':'ies'} left)` : ''),'wrong');
    }
  }
}

function showSeeAnswerBtn(){
  // only add the button once
  if(document.getElementById('see-answer-btn')) return;
  const btnRow = document.querySelector('.btn-row');
  const btn = document.createElement('button');
  btn.id = 'see-answer-btn';
  btn.className = 'btn';
  btn.style.borderColor = '#E8A020';
  btn.style.color = '#854F0B';
  btn.textContent = '👁 See Answer';
  btn.onclick = revealAnswer;
  btnRow.appendChild(btn);
}

function revealAnswer(){
  answerSeen = true;
  const answer = activeStory.sentences[currentIdx].answer;
  // show the answer sentence in the hint area
  const line = answer.join(' ').replace(/ ([,\.!?])/g,'$1').replace(/ '/g,"'").replace(/ —/g,'—');
  const h = document.getElementById('hint-box');
  h.className = 'hint-box info';
  h.innerHTML = `<span><strong>Answer:</strong> <em>${line}</em><br><span style="font-size:12px; color:#888;">Now arrange the words correctly to move on.</span></span>`;
  // remove the See Answer button
  const btn = document.getElementById('see-answer-btn');
  if(btn) btn.remove();
  // reset drop zone WITHOUT calling setHint (which would wipe the answer display)
  placed.forEach(p=>p.el.classList.remove('used'));
  placed=[];
  updateDZ();
}

// ── STORY PREVIEW ─────────────────────────────────────────────────────────────
const STAGE_NAMES = ["Beginning","Build-up","Climax","Resolution"];

function updateStory(){
  const preview=document.getElementById('story-preview');
  const lines=completedLines.filter(Boolean);
  if(lines.length===0){ preview.innerHTML='<em style="color:#ccc;">Your story will appear here as you build each sentence...</em>'; return; }

  // group by stage
  const paras = [[], [], [], []];
  completedLines.forEach((line,i)=>{
    if(line) paras[activeStory.sentences[i].stage].push(line);
  });

  preview.innerHTML = paras.map((para,si)=>{
    if(para.length===0) return '';
    return `<div class="story-para">
      <span class="para-label s${si}">${STAGE_NAMES[si]}</span><br>
      ${para.join(' ')}
    </div>`;
  }).filter(Boolean).join('');

  document.getElementById('wc-note').textContent = `Word count: ~${completedWC}`;
}

function updateProgress(){
  if(!activeStory) return;
  const done=completedLines.filter(Boolean).length;
  const total=activeStory.sentences.length;
  const pct=Math.round(done/total*100);
  document.getElementById('bar-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent=currentIdx<total?`Sentence ${currentIdx+1} of ${total}`:'All done!';
  document.getElementById('wc-label').textContent=`Words built: ~${completedWC}`;
}

// ── COMPLETE ──────────────────────────────────────────────────────────────────
function showComplete(){
  document.getElementById('stage-tabs').innerHTML='';
  document.getElementById('main-area').innerHTML=`
    <div class="complete-banner">
      <h2>🎉 You finished the story!</h2>
      <p>You arranged all ${activeStory.sentences.length} sentences. Read your full story below!</p>
    </div>`;
  document.getElementById('bar-fill').style.width='100%';
  document.getElementById('progress-label').textContent='All done!';
}
</script>
