<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Story Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    background: #FFF8F0;
    color: #1a1a2e;
    min-height: 100vh;
    padding: 0 0 60px;
    transition: background 0.5s;
  }

  /* ── PICKER ───────────────────────────────────────────── */
  .picker-hero {
    background: linear-gradient(135deg, #FF6B6B 0%, #FFD93D 50%, #6BCB77 100%);
    padding: 40px 24px 32px;
    text-align: center;
  }
  .picker-hero h1 {
    font-size: 42px; font-weight: 900; color: #fff;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    letter-spacing: -0.5px; margin-bottom: 6px;
  }
  .picker-hero p {
    font-size: 18px; color: rgba(255,255,255,0.92); font-weight: 600;
  }
  .picker-body { max-width: 860px; margin: 0 auto; padding: 32px 16px; }
  .picker-body h2 { font-size: 24px; font-weight: 800; margin-bottom: 6px; color: #333; }
  .picker-body > p { font-size: 16px; color: #666; margin-bottom: 24px; font-weight: 600; }

  .story-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
  .story-card-btn {
    background: #fff; border: 3px solid #e0e4ea; border-radius: 20px;
    cursor: pointer; text-align: left; overflow: hidden;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    font-family: inherit; padding: 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  }
  .story-card-btn:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 12px 32px rgba(0,0,0,0.14);
    border-color: #FFD93D;
  }
  .story-card-img {
    width: 100%; height: 180px; object-fit: cover; display: block;
  }
  .story-card-body { padding: 16px 18px 18px; }
  .story-card-emoji { font-size: 28px; margin-bottom: 6px; display: block; }
  .story-card-btn h3 { font-size: 20px; font-weight: 800; margin-bottom: 5px; color: #1a1a2e; }
  .story-card-btn p  { font-size: 16px; color: #777; line-height: 1.5; font-weight: 600; }
  .story-card-tag {
    display: inline-block; font-size: 12px; padding: 4px 11px; border-radius: 20px;
    background: #FFF3CD; color: #856404; margin-top: 10px; font-weight: 700;
    border: 1.5px solid #FFD93D;
  }

  /* ── GAME HEADER ──────────────────────────────────────── */
  .game-header {
    position: relative; overflow: hidden;
    min-height: 140px; display: flex; align-items: flex-end;
  }
  .game-header-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    filter: brightness(0.55);
    transition: background-image 0.4s;
  }
  .game-header-overlay {
    position: relative; z-index: 1;
    width: 100%; padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .game-header-left { display: flex; align-items: center; gap: 12px; }
  .game-header-icon { font-size: 36px; }
  .game-header-title { font-size: 24px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
  .game-header-sub   { font-size: 14px; color: rgba(255,255,255,0.85); font-weight: 600; margin-top: 2px; }
  .back-btn {
    background: rgba(255,255,255,0.22); border: 2px solid rgba(255,255,255,0.5);
    color: #fff; border-radius: 10px; padding: 8px 16px;
    font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 700;
    white-space: nowrap; transition: background 0.15s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.35); }

  /* ── PROGRESS ─────────────────────────────────────────── */
  .progress-wrap { background: #fff; border-bottom: 2px solid #f0f0f0; padding: 12px 24px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 16px; color: #555; margin-bottom: 6px; font-weight: 700; }
  .bar-bg   { height: 10px; border-radius: 5px; background: #f0f0f0; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg,#FF6B6B,#FFD93D,#6BCB77); transition: width 0.4s ease; }

  .container { max-width: 780px; margin: 0 auto; padding: 0 16px; }

  /* ── STAGE TABS ───────────────────────────────────────── */
  .stage-tabs { display: flex; gap: 8px; flex-wrap: wrap; padding: 16px 0 0; }
  .stage-tab {
    padding: 8px 18px; border-radius: 20px; font-size: 15px;
    border: 2.5px solid #ddd; background: #fff; color: #666;
    cursor: pointer; transition: all 0.15s; font-family: inherit; font-weight: 700; font-size: 16px;
  }
  .stage-tab.active  { background: #FF6B6B; border-color: #FF6B6B; color: #fff; }
  .stage-tab.done    { background: #E8F8EE; border-color: #6BCB77; color: #1a7a3a; }
  .stage-tab:disabled{ opacity: 0.38; cursor: default; }

  /* ── MAIN CARD ────────────────────────────────────────── */
  .main-card {
    background: #fff; border: 2.5px solid #eee; border-radius: 20px;
    padding: 22px; margin-top: 16px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.06);
  }
  .prompt-strip {
    background: linear-gradient(135deg, #FFF3CD, #FFF8E1);
    border-left: 5px solid #FFD93D; border-radius: 0 12px 12px 0;
    padding: 12px 16px; margin-bottom: 16px;
    font-size: 19px; color: #5a3e00; font-weight: 700;
  }
  .section-label {
    font-size: 12px; color: #aaa; margin-bottom: 8px;
    font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
  }

  /* ── TILES ────────────────────────────────────────────── */
  .tile-bank { display: flex; flex-wrap: wrap; min-height: 52px; margin-bottom: 14px; }
  .tile {
    display: inline-flex; align-items: center;
    padding: 9px 17px; margin: 5px; border-radius: 30px;
    font-size: 20px; cursor: pointer; font-weight: 700;
    border: 2.5px solid #D0D7E0;
    background: #fff; color: #1a1a2e;
    user-select: none;
    transition: opacity 0.15s, transform 0.12s, box-shadow 0.12s;
    font-family: inherit;
    box-shadow: 0 2px 6px rgba(0,0,0,0.07);
  }
  .tile:hover:not(.used) {
    transform: scale(1.08) translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.13);
    border-color: #FF6B6B; color: #FF6B6B;
  }
  .tile:active:not(.used) { transform: scale(0.96); }
  .tile.used { opacity: 0.18; pointer-events: none; }

  /* ── DROP ZONE ────────────────────────────────────────── */
  .drop-zone {
    min-height: 66px; border: 3px dashed #D0D7E0;
    border-radius: 14px; padding: 10px 14px;
    display: flex; flex-wrap: wrap; align-items: center;
    background: #FAFBFC; transition: background 0.15s, border-color 0.15s;
  }
  .drop-zone.over { background: #FFF3CD; border-color: #FFD93D; }
  .drop-zone-empty { font-size: 17px; color: #C0C8D0; font-style: italic; font-weight: 600; }
  .placed-tile {
    display: inline-flex; align-items: center;
    padding: 9px 17px; margin: 4px; border-radius: 30px;
    font-size: 20px; cursor: pointer; font-weight: 700;
    background: #6BCB77; border: 2.5px solid #4aaa55;
    color: #fff; font-family: inherit;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(107,203,119,0.3);
  }
  .placed-tile:hover { opacity: 0.75; transform: scale(0.96); }
  .placed-tile.dz-over { border-color: #FFD93D; box-shadow: -4px 0 0 #FFD93D; transform: translateX(4px); }

  /* ── HINT ─────────────────────────────────────────────── */
  .hint-box {
    font-size: 17px; padding: 11px 15px; border-radius: 10px;
    min-height: 40px; display: flex; align-items: center; gap: 8px;
    margin-top: 10px; font-weight: 700;
  }
  .hint-box.info  { background: #F5F7FA; color: #666; border: 2px solid #E8ECF0; }
  .hint-box.right { background: #E8F8EE; color: #1a7a3a; border: 2px solid #6BCB77; }
  .hint-box.wrong { background: #FFF0F0; color: #c0392b; border: 2px solid #FF6B6B; }

  /* ── BUTTONS ──────────────────────────────────────────── */
  .btn-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .btn {
    padding: 11px 26px; border-radius: 12px;
    border: 2.5px solid #D0D7E0; background: #fff; color: #333;
    font-size: 18px; cursor: pointer; font-family: inherit;
    font-weight: 800; transition: background 0.15s, transform 0.1s;
  }
  .btn:hover  { background: #F5F7FA; }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: #FF6B6B; border-color: #FF6B6B; color: #fff;
    box-shadow: 0 4px 14px rgba(255,107,107,0.35);
  }
  .btn.primary:hover { background: #e05555; }

  /* ── STORY PREVIEW ────────────────────────────────────── */
  .story-section { margin-top: 28px; }
  .story-preview {
    background: #fff; border: 2.5px solid #eee; border-radius: 16px;
    padding: 20px 22px; font-size: 19px; line-height: 2.1; color: #1a1a2e;
    min-height: 66px; box-shadow: 0 4px 18px rgba(0,0,0,0.05);
    font-weight: 600;
  }
  .story-para { margin-bottom: 16px; }
  .story-para:last-child { margin-bottom: 0; }
  .para-label {
    display: inline-block; font-size: 11px; font-weight: 800;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 11px; border-radius: 20px; margin-bottom: 6px;
  }
  .para-label.s0 { background: #E6F1FB; color: #185FA5; }
  .para-label.s1 { background: #FFF3CD; color: #856404; }
  .para-label.s2 { background: #FFF0F0; color: #c0392b; }
  .para-label.s3 { background: #E8F8EE; color: #1a7a3a; }
  .wc-note { font-size: 13px; color: #bbb; margin-top: 10px; text-align: right; font-weight: 700; }

  /* ── COMPLETE ─────────────────────────────────────────── */
  .complete-banner {
    background: linear-gradient(135deg, #6BCB77, #4aaa55);
    border-radius: 16px; padding: 28px 24px; text-align: center; margin-top: 16px;
    box-shadow: 0 6px 24px rgba(107,203,119,0.3);
  }
  .complete-banner h2 { font-size: 26px; color: #fff; margin-bottom: 8px; font-weight: 900; }
  .complete-banner p  { font-size: 16px; color: rgba(255,255,255,0.9); font-weight: 700; }

  @media (max-width: 520px) {
    .picker-hero h1 { font-size: 30px; }
    .game-header-title { font-size: 19px; }
    .tile, .placed-tile { font-size: 15px; padding: 7px 13px; }
    .prompt-strip { font-size: 15px; }
  }
</style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeStory = null;
let currentIdx  = 0;
let placed      = [];
let completedLines = [];
let completedWC = 0;
let tryCount    = 0;
let answerSeen  = false;


function shuffle(arr){ let a=[...arr]; for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ── STORY SELECTION ───────────────────────────────────────────────────────────
function startStory(idx){
  activeStory    = STORIES[idx];
  currentIdx     = 0;
  placed         = [];
  completedLines = [];
  completedWC    = 0;
  document.getElementById('picker-screen').style.display = 'none';
  const gs = document.getElementById('game-screen');
  gs.style.display = 'block';
  document.getElementById('hdr-icon').textContent  = activeStory.icon;
  document.getElementById('hdr-title').textContent = activeStory.title;
  document.getElementById('hdr-sub').textContent   = activeStory.sub;
  document.getElementById('game-header-bg').style.backgroundImage = 'url(' + activeStory.bgImage + ')';
  updateProgress();
  renderTabs();
  renderSentence();
}

function goBack(){
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('picker-screen').style.display = 'block';
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function renderTabs(){
  const tabs = document.getElementById('stage-tabs');
  tabs.innerHTML = STAGES.map((s,i)=>{
    const items    = activeStory.sentences.filter(x=>x.stage===i);
    const firstIdx = activeStory.sentences.findIndex(x=>x.stage===i);
    const allDone  = items.every((_,k)=>completedLines[firstIdx+k]);
    const isCurrent= currentIdx < activeStory.sentences.length && activeStory.sentences[currentIdx].stage===i;
    let cls = 'stage-tab';
    if(isCurrent) cls+=' active';
    else if(allDone) cls+=' done';
    const dis = (!isCurrent && !allDone && firstIdx > currentIdx) ? 'disabled' : '';
    return `<button class="${cls}" ${dis} onclick="jumpStage(${i})">${s.name}${allDone?' ✓':''}</button>`;
  }).join('');
}

function jumpStage(s){
  const firstIdx = activeStory.sentences.findIndex(x=>x.stage===s);
  const items    = activeStory.sentences.filter(x=>x.stage===s);
  const allDone  = items.every((_,k)=>completedLines[firstIdx+k]);
  const isCur    = activeStory.sentences[currentIdx] && activeStory.sentences[currentIdx].stage===s;
  if(isCur) return;
  if(allDone){ currentIdx=firstIdx; placed=[]; renderSentence(); }
}

// ── RENDER SENTENCE ───────────────────────────────────────────────────────────
function renderSentence(){
  if(currentIdx >= activeStory.sentences.length){ showComplete(); return; }
  const item     = activeStory.sentences[currentIdx];
  const shuffled = shuffle(item.tiles);
  const area     = document.getElementById('main-area');
  area.innerHTML = `
    <div class="main-card">
      <div class="prompt-strip">${STAGES[item.stage].prompt}</div>
      <p class="section-label">Word tiles — click a word to place it</p>
      <div class="tile-bank" id="tile-bank">
        ${shuffled.map((w,i)=>`<button class="tile" data-word="${w}" id="st-${i}">${w}</button>`).join('')}
      </div>
      <p class="section-label" style="margin-top:10px;">Your sentence</p>
      <div class="drop-zone" id="drop-zone"><span class="drop-zone-empty">Click words above — tap a green word to remove it</span></div>
      <div class="hint-box info" id="hint-box"></div>
      <div class="btn-row">
        <button class="btn primary" onclick="checkSentence()">✓ Check</button>
        <button class="btn" onclick="clearDZ()">↺ Clear</button>
      </div>
    </div>`;
  placed = [];
  tryCount   = 0;
  answerSeen = false;
  updateProgress();
  renderTabs();
  attachEvents();
}

// ── DRAG STATE ────────────────────────────────────────────────────────────────
let bankDragSrc  = null; // tile being dragged FROM the bank
let dzDragIdx    = null; // index of placed tile being dragged WITHIN the drop zone
let dzDragOver   = null; // index of placed tile being hovered over

// ── EVENTS ────────────────────────────────────────────────────────────────────
function attachEvents(){
  // Bank tiles: click or drag into drop zone
  document.querySelectorAll('.tile').forEach(t=>{
    t.addEventListener('click',()=>{
      if(!t.classList.contains('used')){
        placed.push({word:t.dataset.word, el:t});
        t.classList.add('used');
        updateDZ();
        setHint('','info');
      }
    });
    t.setAttribute('draggable','true');
    t.addEventListener('dragstart', e=>{
      bankDragSrc = t; dzDragIdx = null;
      e.dataTransfer.effectAllowed = 'copy';
      e.dataTransfer.setData('text/plain', 'bank');
    });
    t.addEventListener('dragend', ()=>{ bankDragSrc=null; });
  });

  // Drop zone: accepts bank tiles AND reorders placed tiles
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e=>{
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    // highlight insert position among placed tiles
    const target = e.target.closest('.placed-tile');
    document.querySelectorAll('.placed-tile').forEach(el=>el.classList.remove('dz-over'));
    if(target) target.classList.add('dz-over');
    else dz.classList.add('over');
  });
  dz.addEventListener('dragleave', e=>{
    if(!dz.contains(e.relatedTarget)){
      dz.classList.remove('over');
      document.querySelectorAll('.placed-tile').forEach(el=>el.classList.remove('dz-over'));
    }
  });
  dz.addEventListener('drop', e=>{
    e.preventDefault();
    dz.classList.remove('over');
    document.querySelectorAll('.placed-tile').forEach(el=>el.classList.remove('dz-over'));

    const target    = e.target.closest('.placed-tile');
    const targetIdx = target ? parseInt(target.dataset.pidx) : placed.length;

    if(bankDragSrc && !bankDragSrc.classList.contains('used')){
      // dragging a NEW word from the bank → insert at position
      const newEntry = {word: bankDragSrc.dataset.word, el: bankDragSrc};
      bankDragSrc.classList.add('used');
      placed.splice(targetIdx, 0, newEntry);
      updateDZ(); setHint('','info');
    } else if(dzDragIdx !== null && dzDragIdx !== targetIdx){
      // reordering within the drop zone
      const moving = placed.splice(dzDragIdx, 1)[0];
      const insertAt = dzDragIdx < targetIdx ? targetIdx - 1 : targetIdx;
      placed.splice(insertAt, 0, moving);
      updateDZ(); setHint('','info');
    }
    bankDragSrc = null; dzDragIdx = null;
  });
}

function updateDZ(){
  const dz = document.getElementById('drop-zone');
  if(placed.length===0){
    dz.innerHTML='<span class="drop-zone-empty">Click words above to add them — then drag placed words to reorder</span>';
    return;
  }
  dz.innerHTML = placed.map((p,i)=>
    `<button class="placed-tile" draggable="true" data-pidx="${i}"
      ondragstart="dzTileDragStart(event,${i})"
      ondragend="dzTileDragEnd(event)"
      onclick="removePlaced(${i})"
      title="Click to remove · Drag to reorder">${p.word}</button>`
  ).join('');
}

function dzTileDragStart(e, idx){
  dzDragIdx   = idx;
  bankDragSrc = null;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'dz');
  e.currentTarget.style.opacity = '0.4';
}
function dzTileDragEnd(e){
  e.currentTarget.style.opacity = '';
  dzDragIdx = null;
  document.querySelectorAll('.placed-tile').forEach(el=>el.classList.remove('dz-over'));
}

function removePlaced(idx){
  // only remove on click, not after a drag
  if(dzDragIdx !== null) return;
  placed[idx].el.classList.remove('used');
  placed.splice(idx,1);
  updateDZ(); setHint('','info');
}
function clearDZ(){ placed.forEach(p=>p.el.classList.remove('used')); placed=[]; updateDZ(); setHint('','info'); }
function setHint(msg,type){
  const h=document.getElementById('hint-box');
  if(!h)return;
  h.className='hint-box '+type;
  h.style.flexDirection='';
  h.style.alignItems='';
  h.textContent=msg;
}

// ── CHECK ─────────────────────────────────────────────────────────────────────
function checkSentence(){
  const answer=activeStory.sentences[currentIdx].answer;
  const words=placed.map(p=>p.word);
  if(words.length===0){ setHint('Click some words to build your sentence first!','info'); return; }
  const correct=words.length===answer.length && words.every((w,i)=>w===answer[i]);
  if(correct){
    const emoji = answerSeen ? '✅ Good effort! You got it right.' : '⭐ Well done! That sentence is correct!';
    setHint(emoji,'right');
    const line=words.join(' ').replace(/ ([,\.!?])/g,'$1').replace(/ '/g,"'").replace(/ —/g,'—');
    completedLines[currentIdx]=line;
    completedWC=completedLines.filter(Boolean).reduce((s,l)=>s+l.split(' ').length,0);
    updateStory();
    updateProgress();
    setTimeout(()=>{ currentIdx++; placed=[]; renderSentence(); },950);
  } else {
    tryCount++;
    // build feedback message
    let msg='';
    if(words.length<answer.length) msg=`Not quite — you still need ${answer.length-words.length} more word(s).`;
    else if(words.length>answer.length) msg='Too many words — try removing some.';
    else { const f=words.findIndex((w,i)=>w!==answer[i]); msg=`Check word ${f+1} — something is not right there. Try again!`; }
    // after 3 wrong tries show the See Answer button (only once)
    if(tryCount>=3 && !answerSeen){
      setHint(msg + '  (3 tries used — you can now see the answer below.)','wrong');
      showSeeAnswerBtn();
    } else if(answerSeen){
      setHint(msg,'wrong');
    } else {
      const left = 3-tryCount;
      setHint(msg + (left>0 ? ` (${left} tr${left===1?'y':'ies'} left)` : ''),'wrong');
    }
  }
}

function showSeeAnswerBtn(){
  // only add the button once
  if(document.getElementById('see-answer-btn')) return;
  const btnRow = document.querySelector('.btn-row');
  const btn = document.createElement('button');
  btn.id = 'see-answer-btn';
  btn.className = 'btn';
  btn.style.borderColor = '#E8A020';
  btn.style.color = '#854F0B';
  btn.textContent = '👁 See Answer';
  btn.onclick = revealAnswer;
  btnRow.appendChild(btn);
}

function revealAnswer(){
  answerSeen = true;
  const answer = activeStory.sentences[currentIdx].answer;
  const line = answer.join(' ').replace(/ ([,\.!?])/g,'$1').replace(/ '/g,"'").replace(/ —/g,'—');

  // remove the See Answer button first
  const btn = document.getElementById('see-answer-btn');
  if(btn) btn.remove();

  // reset drop zone without touching hint box
  placed.forEach(p=>p.el.classList.remove('used'));
  placed=[];
  updateDZ();

  // write answer into hint box AFTER updateDZ so nothing overwrites it
  const h = document.getElementById('hint-box');
  h.className = 'hint-box info';
  h.style.flexDirection = 'column';
  h.style.alignItems = 'flex-start';
  h.style.gap = '4px';
  h.innerHTML = '<strong style="font-size:17px;">Answer:</strong>'
    + '<em style="font-size:18px; color:#1a1a2e; line-height:1.7;">' + line + '</em>'
    + '<span style="font-size:15px; color:#888;">Now arrange the words in the same order to move on.</span>';
}

// ── STORY PREVIEW ─────────────────────────────────────────────────────────────
const STAGE_NAMES = ["Beginning","Build-up","Climax","Resolution"];

function updateStory(){
  const preview=document.getElementById('story-preview');
  const lines=completedLines.filter(Boolean);
  if(lines.length===0){ preview.innerHTML='<em style="color:#ccc;">Your story will appear here as you build each sentence...</em>'; return; }

  // group by stage
  const paras = [[], [], [], []];
  completedLines.forEach((line,i)=>{
    if(line) paras[activeStory.sentences[i].stage].push(line);
  });

  preview.innerHTML = paras.map((para,si)=>{
    if(para.length===0) return '';
    return `<div class="story-para">
      <span class="para-label s${si}">${STAGE_NAMES[si]}</span><br>
      ${para.join(' ')}
    </div>`;
  }).filter(Boolean).join('');

  document.getElementById('wc-note').textContent = `Word count: ~${completedWC}`;
}

function updateProgress(){
  if(!activeStory) return;
  const done=completedLines.filter(Boolean).length;
  const total=activeStory.sentences.length;
  const pct=Math.round(done/total*100);
  document.getElementById('bar-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent=currentIdx<total?`Sentence ${currentIdx+1} of ${total}`:'All done!';
  document.getElementById('wc-label').textContent=`Words built: ~${completedWC}`;
}

// ── COMPLETE ──────────────────────────────────────────────────────────────────
function showComplete(){
  document.getElementById('stage-tabs').innerHTML='';
  document.getElementById('main-area').innerHTML=`
    <div class="complete-banner">
      <h2>🎉 You finished the story!</h2>
      <p>You arranged all ${activeStory.sentences.length} sentences. Read your full story below!</p>
    </div>`;
  document.getElementById('bar-fill').style.width='100%';
  document.getElementById('progress-label').textContent='All done!';
}
</script>
